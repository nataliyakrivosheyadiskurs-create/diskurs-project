<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд удержания проектов</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f3ef;
  color: #2c2c2a;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Layout ── */
.page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; }
.top-bar {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 24px; flex-wrap: wrap;
}
.top-bar h1 { font-size: 20px; font-weight: 500; color: #2c2c2a; }
.top-bar .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.refresh-btn {
  padding: 6px 14px; border: 1px solid #b4b2a9; border-radius: 8px;
  background: #fff; color: #5f5e5a; font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.refresh-btn:hover { background: #f1efe8; }
.last-update { font-size: 12px; color: #888780; }

select {
  padding: 7px 12px; border: 1px solid #b4b2a9; border-radius: 8px;
  background: #fff; color: #2c2c2a; font-size: 14px; cursor: pointer;
}

/* ── KPI grid ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.kpi {
  background: #fff; border-radius: 12px; padding: 16px 18px;
  border: 0.5px solid #d3d1c7;
}
.kpi-label { font-size: 12px; color: #888780; margin-bottom: 6px; }
.kpi-value { font-size: 24px; font-weight: 500; }
.kpi-sub { font-size: 12px; color: #b4b2a9; margin-top: 3px; }

/* ── Charts row ── */
.charts-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; margin-bottom: 20px;
}
@media (max-width: 640px) { .charts-row { grid-template-columns: 1fr; } }

.card {
  background: #fff; border-radius: 12px; padding: 18px;
  border: 0.5px solid #d3d1c7;
}
.card-title {
  font-size: 13px; font-weight: 500; color: #2c2c2a;
  margin-bottom: 14px;
}
.chart-wrap { position: relative; width: 100%; }

/* ── Tabs ── */
.tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.tab {
  padding: 5px 13px; border: 1px solid #b4b2a9; border-radius: 8px;
  font-size: 12px; cursor: pointer; background: transparent; color: #5f5e5a;
  transition: all .15s;
}
.tab:hover { background: #f1efe8; }
.tab.active {
  background: #e6f1fb; color: #185fa5;
  border-color: #85b7eb;
}

/* ── Rank table ── */
.rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rank-table th {
  text-align: left; padding: 7px 10px; color: #888780;
  font-weight: 500; border-bottom: 0.5px solid #d3d1c7; font-size: 12px;
}
.rank-table td { padding: 8px 10px; border-bottom: 0.5px solid #f1efe8; }
.rank-table tr:last-child td { border-bottom: none; }
.rank-table tr:hover td { background: #f9f8f5; }
.medal {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  font-size: 11px; font-weight: 600;
}
.m1 { background: #fde68a; color: #78350f; }
.m2 { background: #e5e7eb; color: #374151; }
.m3 { background: #fde7ca; color: #7c2d12; }
.bar-wrap { display: flex; align-items: center; gap: 8px; }
.bar-bg { flex: 1; height: 8px; background: #f1efe8; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.bar-val { font-size: 12px; font-weight: 500; min-width: 36px; text-align: right; }

/* ── Loading / error ── */
.state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 300px; gap: 12px; color: #888780;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid #d3d1c7;
  border-top-color: #378add; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: #a32d2d; font-size: 14px; text-align: center; max-width: 480px; }

/* ── Legend ── */
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #5f5e5a; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="page">

  <!-- ЗАГРУЗКА -->
  <div id="loading" class="state">
    <div class="spinner"></div>
    <div>Загружаем данные из Google Таблицы…</div>
  </div>

  <!-- ОШИБКА -->
  <div id="error" class="state" style="display:none">
    <div class="error-msg" id="errorMsg"></div>
    <button class="refresh-btn" onclick="loadData()">Попробовать снова</button>
  </div>

  <!-- ДАШБОРД -->
  <div id="dash" style="display:none">

    <div class="top-bar">
      <h1>Удержание проектов — отдел проджектов</h1>
      <div class="right">
        <span class="last-update" id="lastUpdate"></span>
        <button class="refresh-btn" onclick="loadData()">↻ Обновить</button>
        <select id="monthSel" onchange="onMonthChange()"></select>
      </div>
    </div>

    <!-- KPI -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Два графика рядом -->
    <div class="charts-row">
      <div class="card">
        <div class="card-title">% удержания всех проектов</div>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chartAll" role="img" aria-label="Удержание всех проектов по сотрудникам"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">% удержания новых проектов</div>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chartNew" role="img" aria-label="Удержание новых проектов по сотрудникам"></canvas>
        </div>
      </div>
    </div>

    <!-- Тренд -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">Динамика удержания по отделу</div>
      <div class="tabs" id="trendTabs">
        <button class="tab active" onclick="setTrendTab('all',this)">Все проекты</button>
        <button class="tab" onclick="setTrendTab('new',this)">Новые проекты</button>
      </div>
      <div class="legend">
        <span class="leg"><span class="leg-dot" style="background:#378add"></span>Среднее по отделу (взвешенное)</span>
      </div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="chartTrend" role="img" aria-label="Динамика удержания по отделу"></canvas>
      </div>
    </div>

    <!-- Рейтинг -->
    <div class="card">
      <div class="card-title" style="margin-bottom:14px">Рейтинг сотрудников</div>
      <div class="tabs" id="rankTabs">
        <button class="tab active" onclick="setRankTab('all',this)">Все проекты</button>
        <button class="tab" onclick="setRankTab('new',this)">Новые проекты</button>
        <button class="tab" onclick="setRankTab('old',this)">Старые проекты</button>
      </div>
      <table class="rank-table">
        <thead><tr>
          <th style="width:36px">#</th>
          <th>Сотрудник</th>
          <th>% удержания</th>
          <th style="width:90px">Проектов</th>
          <th style="width:120px">Осталось</th>
        </tr></thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>

  </div><!-- /dash -->
</div><!-- /page -->

<script>
// ──────────────────────────────────────────────
// ЗАМЕНИ ЭТУ ССЫЛКУ на URL своего GAS-скрипта
// (Развернуть → Создать развертывание → Веб-приложение)
// ──────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxzbgk1AyJLKyNdfxWcFv9x9alyVkItXUAQVNaZhC9etoPzSdeYUSrrSufA6l7fMm_euA/exec';

// ──────────────────────────────────────────────
let RAW = [];
let ALL_MONTHS = [];
let MONTH_ORDER_LIST = [];
let currentMonth = '';
let rankMode = 'all';
let trendMode = 'all';
let chartAllInst, chartNewInst, chartTrendInst;

// ── Загрузка данных ──
async function loadData() {
  show('loading');
  try {
    const res = await fetch(GAS_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    RAW = data.records;
    ALL_MONTHS = data.months;
    MONTH_ORDER_LIST = data.monthOrder;

    currentMonth = ALL_MONTHS[ALL_MONTHS.length - 1];
    buildMonthSelect();
    document.getElementById('lastUpdate').textContent =
      'Обновлено: ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    show('dash');
    render();
  } catch (e) {
    document.getElementById('errorMsg').innerHTML =
      '<b>Не удалось загрузить данные</b><br>' + e.message +
      '<br><br>Убедись, что:<br>' +
      '1. URL в переменной <code>GAS_URL</code> заменён на актуальный<br>' +
      '2. Веб-приложение опубликовано с доступом «Все»<br>' +
      '3. В скрипте нет ошибок (проверь через testBuild)';
    show('error');
  }
}

function show(id) {
  ['loading','error','dash'].forEach(i =>
    document.getElementById(i).style.display = i === id ? '' : 'none'
  );
}

// ── Вспомогалки ──
function monthRows(month) {
  return RAW.filter(r => r.month === month);
}

function groupByEmployee(rows) {
  const map = {};
  rows.forEach(r => {
    if (!map[r.employee]) map[r.employee] = {total:0, new_:0, stayAll:0, stayNew:0, sum:0, staySum:0};
    const e = map[r.employee];
    e.total   += r.total;
    e.new_    += r.new_;
    e.stayAll += r.stayAll;
    e.stayNew += r.stayNew;
    e.sum     += r.sum;
    e.staySum += r.staySum;
  });
  Object.values(map).forEach(e => {
    e.retAll = e.total > 0 ? e.stayAll / e.total : null;
    e.retNew = e.new_  > 0 ? e.stayNew / e.new_  : null;
    const oldTotal = e.total - e.new_;
    const oldStay  = e.stayAll - e.stayNew;
    e.retOld = oldTotal > 0 ? oldStay / oldTotal : null;
  });
  return map;
}

function pct(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return Math.round(v * 100) + '%';
}
function fmtNum(v) {
  return v == null ? '—' : v.toLocaleString('ru-RU');
}
function retColor(v) {
  if (v === null) return '#888780';
  if (v >= 0.85)  return '#1d9e75';
  if (v >= 0.70)  return '#378add';
  if (v >= 0.50)  return '#ef9f27';
  return '#e24b4a';
}

// ── Выпадающий список месяцев ──
function buildMonthSelect() {
  const sel = document.getElementById('monthSel');
  sel.innerHTML = '';
  ALL_MONTHS.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === currentMonth) o.selected = true;
    sel.appendChild(o);
  });
}
function onMonthChange() {
  currentMonth = document.getElementById('monthSel').value;
  render();
}

// ── KPI ──
function renderKPI(rows) {
  const total    = rows.reduce((s,r) => s + r.total,    0);
  const newProj  = rows.reduce((s,r) => s + r.new_,     0);
  const stayAll  = rows.reduce((s,r) => s + r.stayAll,  0);
  const stayNew  = rows.reduce((s,r) => s + r.stayNew,  0);
  const sum      = rows.reduce((s,r) => s + r.sum,      0);
  const staySum  = rows.reduce((s,r) => s + r.staySum,  0);
  const retAll   = total   > 0 ? stayAll / total   : null;
  const retNew   = newProj > 0 ? stayNew / newProj : null;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Всего проектов</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">из них новых: ${newProj}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">% удержания — все проекты</div>
      <div class="kpi-value" style="color:${retColor(retAll)}">${pct(retAll)}</div>
      <div class="kpi-sub">${stayAll} из ${total} не ушли</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">% удержания — новые проекты</div>
      <div class="kpi-value" style="color:${retColor(retNew)}">${pct(retNew)}</div>
      <div class="kpi-sub">${stayNew} из ${newProj} не ушли</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Сумма проектов месяца</div>
      <div class="kpi-value" style="font-size:17px">${fmtNum(sum)} ₸</div>
      <div class="kpi-sub">остаётся: ${fmtNum(staySum)} ₸</div>
    </div>
  `;
}

// ── Горизонтальные бары по сотрудникам ──
function renderBarCharts(rows) {
  const emp   = groupByEmployee(rows);
  const names = Object.keys(emp).sort();
  const allV  = names.map(n => emp[n].retAll !== null ? Math.round(emp[n].retAll * 100) : 0);
  const newF  = names.map((n,i) => ({name:n, val: emp[n].retNew !== null ? Math.round(emp[n].retNew*100) : null}))
                     .filter(x => x.val !== null);

  const opts = (maxV) => ({
    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
    plugins: { legend: { display: false } },
    scales: {
      x: { min:0, max:100, grid:{color:'rgba(0,0,0,.05)'}, ticks:{callback: v=>v+'%', font:{size:11}, color:'#888780'} },
      y: { grid:{display:false}, ticks:{font:{size:11}, color:'#2c2c2a'} }
    }
  });

  if (chartAllInst) chartAllInst.destroy();
  chartAllInst = new Chart(document.getElementById('chartAll'), {
    type: 'bar',
    data: {
      labels: names,
      datasets: [{ data: allV, backgroundColor: allV.map(v=>retColor(v/100)), borderRadius: 4 }]
    },
    options: opts(100)
  });

  if (chartNewInst) chartNewInst.destroy();
  chartNewInst = new Chart(document.getElementById('chartNew'), {
    type: 'bar',
    data: {
      labels: newF.map(x=>x.name),
      datasets: [{ data: newF.map(x=>x.val), backgroundColor: newF.map(x=>retColor(x.val/100)), borderRadius: 4 }]
    },
    options: opts(100)
  });
}

// ── Тренд ──
function renderTrend() {
  const points = ALL_MONTHS.map(m => {
    const rows = monthRows(m);
    if (!rows.length) return null;
    const totalW = rows.reduce((s,r) => s + (trendMode==='all' ? r.total : r.new_), 0);
    if (!totalW) return null;
    const wsum = rows.reduce((s,r) => {
      const v = trendMode==='all' ? (r.total>0 ? r.stayAll/r.total : 0) : (r.new_>0 ? r.stayNew/r.new_ : 0);
      return s + v * (trendMode==='all' ? r.total : r.new_);
    }, 0);
    return Math.round(wsum / totalW * 100);
  });

  const shortLabels = ALL_MONTHS.map(m => {
    const parts = m.split(' ');
    return parts[0].slice(0,3) + ' ' + parts[1].slice(2);
  });

  if (chartTrendInst) chartTrendInst.destroy();
  chartTrendInst = new Chart(document.getElementById('chartTrend'), {
    type: 'line',
    data: {
      labels: shortLabels,
      datasets: [{
        data: points,
        borderColor: '#378add',
        backgroundColor: 'rgba(55,138,221,0.07)',
        fill: true, tension: 0.3,
        pointRadius: 3, pointHoverRadius: 5,
        borderWidth: 2, spanGaps: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}, color:'#888780', maxRotation:45, autoSkip:false} },
        y: { min:0, max:100, grid:{color:'rgba(0,0,0,.05)'}, ticks:{callback:v=>v+'%', font:{size:11}, color:'#888780'} }
      }
    }
  });
}

// ── Таблица рейтинга ──
function renderRankTable(rows) {
  const emp = groupByEmployee(rows);
  const field = rankMode==='all' ? 'retAll' : rankMode==='new' ? 'retNew' : 'retOld';
  const sorted = Object.entries(emp)
    .filter(([,e]) => e[field] !== null)
    .sort((a,b) => b[1][field] - a[1][field]);

  const medals = ['m1','m2','m3'];
  document.getElementById('rankBody').innerHTML = sorted.map(([name,e], i) => {
    const v = e[field];
    const pctV = Math.round(v * 100);
    const totalForMode = rankMode==='all' ? e.total : rankMode==='new' ? e.new_ : (e.total - e.new_);
    const stayForMode  = rankMode==='all' ? e.stayAll : rankMode==='new' ? e.stayNew : (e.stayAll - e.stayNew);
    const badge = i < 3
      ? `<span class="medal ${medals[i]}">${i+1}</span>`
      : `<span style="font-size:12px;color:#888780;padding-left:4px">${i+1}</span>`;
    return `<tr>
      <td>${badge}</td>
      <td style="font-weight:500">${name}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg">
            <div class="bar-fill" style="width:${pctV}%;background:${retColor(v)}"></div>
          </div>
          <span class="bar-val" style="color:${retColor(v)}">${pctV}%</span>
        </div>
      </td>
      <td style="color:#888780">${totalForMode}</td>
      <td style="color:#888780">${stayForMode}</td>
    </tr>`;
  }).join('');
}

// ── Переключатели вкладок ──
function setRankTab(mode, btn) {
  rankMode = mode;
  document.getElementById('rankTabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderRankTable(monthRows(currentMonth));
}
function setTrendTab(mode, btn) {
  trendMode = mode;
  document.getElementById('trendTabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTrend();
}

// ── Главный рендер ──
function render() {
  const rows = monthRows(currentMonth);
  renderKPI(rows);
  renderBarCharts(rows);
  renderTrend();
  renderRankTable(rows);
}

// Старт
loadData();
</script>
</body>
</html>
